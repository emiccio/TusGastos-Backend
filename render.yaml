# render.yaml — Infrastructure as Code para Render
# La base de datos está en Supabase — acá solo va el web service

services:
  - type: web
    name: tusgastos-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run db:generate
    startCommand: npm run db:migrate && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      # Cargá estas manualmente en Render Dashboard > Environment:
      # DATABASE_URL         → Transaction pooler URL de Supabase (ver README)
      # JWT_SECRET
      # JWT_EXPIRES_IN
      # OPENAI_API_KEY
      # OPENAI_MODEL
      # WHATSAPP_TOKEN
      # WHATSAPP_PHONE_NUMBER_ID
      # WHATSAPP_VERIFY_TOKEN
      # FRONTEND_URL
