# render.yaml — Infrastructure as Code para Render
# Documentación: https://render.com/docs/blueprint-spec
# Commiteá este archivo en la raíz del repo del backend

services:
  - type: web
    name: tusgastos-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run db:generate
    startCommand: npm run db:migrate && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: tusgastos-db
          property: connectionString
      # Estas las cargás a mano en Render Dashboard > Environment:
      # JWT_SECRET
      # JWT_EXPIRES_IN
      # OPENAI_API_KEY
      # OPENAI_MODEL
      # WHATSAPP_TOKEN
      # WHATSAPP_PHONE_NUMBER_ID
      # WHATSAPP_VERIFY_TOKEN
      # FRONTEND_URL

databases:
  - name: tusgastos-db
    plan: free
    databaseName: tusgastos
    user: tusgastos
